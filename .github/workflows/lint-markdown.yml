name: Lint Markdown

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Markdown Lint
        uses: nosborn/github-action-markdown-cli@v3.1.0
        with:
          files: .
          config_file: .markdownlint.json
